version: "3.9"

services:
  backend:
    build:
      context: ./backend
      target: development
    container_name: photobook-backend-dev
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules        # prevent host node_modules from overwriting container's
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: photobook-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules        # prevent host node_modules from overwriting container's
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped
