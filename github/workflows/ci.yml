name: CI - PhotoBook Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix backend

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Lint backend
        run: npm run lint --prefix backend
        continue-on-error: true

      - name: Lint frontend
        run: npm run lint --prefix frontend
        continue-on-error: true

  build:
    needs: lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: Backend Build
            prefix: backend
          - name: Frontend Build
            prefix: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install ${{ matrix.name }} dependencies
        run: npm install --prefix ${{ matrix.prefix }}

      - name: 🏗️ Build ${{ matrix.name }}
        run: npm run build --prefix ${{ matrix.prefix }}

      - name: ✅ ${{ matrix.name }} build successful
        run: echo "Build completed for ${{ matrix.name }}"

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: npm install --prefix backend

      - name: Run backend tests
        run: npm run test --prefix backend
        continue-on-error: true

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Run frontend tests
        run: npm run test --prefix frontend
        continue-on-error: true
