version: "3.9"

services:
  backend:
    build:
      context: ./backend
      target: production
    container_name: photobook-backend-prod
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: always

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: photobook-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
