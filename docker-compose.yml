services:
  backend:
    image: ameenwork/photo-book-backend:latest
    build:
      context: ./backend
      target: production
    container_name: photobook-backend
    restart: always

    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    # Resource limits for production stability
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - photobook-network

  nginx:
    image: nginx:alpine
    container_name: photobook-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - photobook-networ


  mongodb:
    image: mongo:latest
    container_name: photobook-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - photobook-network

  redis:
    image: redis:alpine
    container_name: photobook-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - photobook-network

networks:
  photobook-network:
    driver: bridge

volumes:
  redis_data:
