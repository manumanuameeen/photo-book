version: "3.9"

services:
  backend:
    build:
      context: ./backend
      target: production
    container_name: photobook-backend-prod
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    container_name: photobook-redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

  frontend:
    build:
      context: ./frontend
      target: production
    container_name: photobook-frontend-prod
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always

volumes:
  redis_data:
