version: "3.9"

services:
  backend:
    image: photo-book-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: photobook-backend-prod
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    # Resource limits for production stability
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: always
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:alpine
    container_name: photobook-redis-prod
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    restart: always
    volumes:
      - redis_prod_data:/data
    networks:
      - photobook-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  photobook-network:
    driver: bridge

volumes:
  redis_prod_data:
